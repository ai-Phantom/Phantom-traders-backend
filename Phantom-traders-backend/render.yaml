services:
  - type: web
    name: phantom-traders-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_ANNUAL
        sync: false
      - key: STRIPE_PRICE_ELITE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_ELITE_ANNUAL
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_ROLE_ROOKIE
        sync: false
      - key: DISCORD_ROLE_TRADER
        sync: false
      - key: DISCORD_ROLE_PRO_TRADER
        sync: false
      - key: DISCORD_ROLE_ELITE
        sync: false
      - key: DISCORD_ROLE_OG_MEMBER
        sync: false
      - key: FRONTEND_URL
        value: https://aiphantomtraders.com
      - key: APP_ENV
        value: production
